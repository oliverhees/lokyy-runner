# lokyy-runner — Forgejo-Actions-Runner, deploybar aus diesem Git-Repo (Coolify).
# Repo wählen, drei Env-Variablen setzen, deployen. Das entrypoint-Skript ist ins
# Image gebacken (Dockerfile), darum keine Mount-Fallen.
#
#   FORGEJO_URL    z. B. https://forgejo.deinedomain.de/   (mit Slash am Ende)
#   RUNNER_UUID    aus Forgejo: Actions -> Runners -> "Neuen Runner erstellen"
#   RUNNER_TOKEN   aus demselben Dialog
#   RUNNER_LABELS  optional, Default: docker + ubuntu-latest
services:
  docker-in-docker:
    image: docker:dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    command: ["dockerd", "--host=tcp://0.0.0.0:2375", "--tls=false"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep dockerd >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  runner:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      docker-in-docker:
        condition: service_started
    environment:
      DOCKER_HOST: tcp://docker-in-docker:2375
      FORGEJO_URL: ${FORGEJO_URL}
      RUNNER_UUID: ${RUNNER_UUID}
      RUNNER_TOKEN: ${RUNNER_TOKEN}
      RUNNER_LABELS: ${RUNNER_LABELS:-docker:docker://node:20-bookworm,ubuntu-latest:docker://ghcr.io/catthehacker/ubuntu:act-22.04}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f forgejo-runner >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
